<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - RADIX</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0b10;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card .logo { margin-bottom: 2rem; font-size: 2.5rem; }
        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; opacity: 0.7; }
        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(90deg, #9d00ff, #00d2ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }
        .error-msg { color: #ff4d4d; margin-top: 1rem; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">RA<span>DIX</span></div>
            <h2>Acceso Master</h2>
            <p style="opacity: 0.5; margin-bottom: 2rem;">Solo personal autorizado</p>
            
            <form id="admin-login-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="admin-user" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="admin-pass" required>
                </div>
                <button type="submit" class="btn-login">Entrar al Sistema</button>
                <div id="error-msg" class="error-msg">Credenciales incorrectas</div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const formData = new FormData();
                formData.append('user', user);
                formData.append('pass', pass);

                const response = await fetch('radix_api/admin_login.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('radix_admin', data.user);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.error;
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Error de conexión con el servidor';
            }
        });
    </script>
</body>
</html>
